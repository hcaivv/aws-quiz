<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AWS SAA-C03 문제풀이</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --correct: #22c55e;
      --wrong: #ef4444;
      --option-bg: #1e293b;
      --option-hover: #273549;
      --progress-bg: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      gap: 8px;
    }
    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: #60a5fa;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .score-badge {
      background: #1d4ed8;
      color: #bfdbfe;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .history-btn {
      background: #374151;
      color: #d1d5db;
      border: none;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .history-btn:hover { background: #4b5563; }

    /* Progress */
    .progress-wrap { padding: 12px 16px 0; }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 4px;
      background: var(--progress-bg);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    /* Mode bar */
    .mode-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px 0;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }
    .mode-btn {
      flex: 1;
      padding: 8px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--option-bg);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn.active {
      border-color: var(--accent);
      background: #1e3a5f;
      color: #60a5fa;
    }

    /* Main content */
    .main {
      flex: 1;
      padding: 16px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    /* History view banner */
    .history-banner {
      background: #312e81;
      border: 1px solid #4338ca;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: #c7d2fe;
    }
    .history-banner-text { font-weight: 600; }
    .btn-back-current {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-back-current:hover { background: #4338ca; }

    /* Question card */
    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
    }
    .question-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .question-num {
      background: #1d4ed8;
      color: #bfdbfe;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .multi-badge {
      background: #7c3aed;
      color: #ddd6fe;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .question-text {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      word-break: keep-all;
    }

    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--option-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 13px 15px;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      transition: all 0.15s ease;
      word-break: keep-all;
      width: 100%;
    }
    .option-btn:hover:not(:disabled) {
      background: var(--option-hover);
      border-color: var(--accent);
    }
    .option-btn.selected { border-color: var(--accent); background: #1e3a5f; }
    .option-btn.correct { border-color: var(--correct); background: #14532d; color: #bbf7d0; }
    .option-btn.wrong { border-color: var(--wrong); background: #450a0a; color: #fecaca; }
    .option-btn.dimmed { opacity: 0.45; }
    .option-btn:disabled { cursor: default; }
    .option-letter {
      font-weight: 700;
      font-size: 14px;
      min-width: 20px;
      color: var(--text-muted);
      padding-top: 1px;
    }
    .option-btn.correct .option-letter,
    .option-btn.wrong .option-letter { color: inherit; }
    .option-text { flex: 1; }

    /* Answer reveal */
    .answer-reveal {
      background: #1e293b;
      border: 1px solid #334155;
      border-left: 4px solid var(--correct);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      display: none;
    }
    .answer-reveal.show { display: block; }
    .answer-reveal-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--correct);
      margin-bottom: 8px;
    }
    .answer-text {
      font-size: 15px;
      font-weight: 700;
      color: #4ade80;
      margin-bottom: 6px;
    }
    .explanation-text {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      display: none;
    }
    .explanation-text.show { display: block; }

    /* Result msg */
    .result-msg {
      font-size: 13px;
      text-align: center;
      padding: 6px 0;
      display: none;
    }
    .result-msg.show { display: block; }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 13px 8px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .btn-prev { background: #374151; color: #d1d5db; }
    .btn-prev:hover:not(:disabled) { background: #4b5563; }
    .btn-prev:disabled { opacity: 0.35; cursor: default; }
    .btn-answer { background: #1d4ed8; color: white; }
    .btn-answer:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-answer:disabled { background: #334155; color: var(--text-muted); cursor: default; }
    .btn-next { background: #16a34a; color: white; }
    .btn-next:hover { background: #15803d; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 10px 16px;
      background: var(--card);
      border-top: 1px solid var(--border);
      justify-content: center;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
    .stat-dot.correct { background: var(--correct); }
    .stat-dot.wrong { background: var(--wrong); }
    .stat-dot.total { background: #60a5fa; }

    /* ─── History Modal ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      overflow-y: auto;
    }
    .modal-overlay.show { display: block; }
    .modal {
      background: var(--card);
      border-radius: 16px;
      margin: 20px auto;
      max-width: 700px;
      width: calc(100% - 32px);
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--card);
      z-index: 1;
    }
    .modal-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .modal-close {
      background: #374151;
      border: none;
      color: #d1d5db;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { background: #4b5563; }
    .modal-body { padding: 12px; }
    .modal-empty {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .history-item:hover { background: #273549; }
    .history-result-icon { font-size: 18px; min-width: 22px; text-align: center; }
    .history-info { flex: 1; min-width: 0; }
    .history-qnum {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 3px;
    }
    .history-qtext {
      font-size: 13px;
      color: var(--text);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .history-answer {
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .history-answer.correct { background: #14532d; color: #4ade80; }
    .history-answer.wrong { background: #450a0a; color: #f87171; }
    .history-filter {
      display: flex;
      gap: 8px;
      padding: 0 0 12px;
    }
    .filter-btn {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .filter-btn.active {
      border-color: var(--accent);
      color: #60a5fa;
      background: #1e3a5f;
    }

    @media (max-width: 400px) {
      .question-text { font-size: 14px; }
      .option-btn { font-size: 13px; padding: 11px 12px; }
      .btn { font-size: 13px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-title">☁️ AWS SAA-C03</div>
  <div class="header-right">
    <button class="history-btn" onclick="openHistory()">📋 기록 <span id="historyCount">0</span></button>
    <div class="score-badge" id="scoreBadge">0 / 0</div>
  </div>
</div>

<!-- Mode bar -->
<div class="mode-bar">
  <button class="mode-btn active" id="modeRandom" onclick="setMode('random')">🔀 랜덤</button>
  <button class="mode-btn" id="modeSequential" onclick="setMode('sequential')">📋 순서대로</button>
  <button class="mode-btn" id="modeWrong" onclick="setMode('wrong')">❌ 오답만</button>
</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-info">
    <span id="progressText">0 / 800</span>
    <span id="percentText">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<!-- Main -->
<div class="main" id="mainContent">
  <div class="loading">문제를 불러오는 중...</div>
</div>

<!-- Stats bar -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-dot correct"></div><span id="statCorrect">정답 0</span></div>
  <div class="stat-item"><div class="stat-dot wrong"></div><span id="statWrong">오답 0</span></div>
  <div class="stat-item"><div class="stat-dot total"></div><span id="statTotal">총 0문제</span></div>
</div>

<!-- History Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeHistoryOnBg(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">📋 풀었던 문제 기록</div>
      <button class="modal-close" onclick="closeHistory()">✕</button>
    </div>
    <div class="modal-body">
      <div class="history-filter">
        <button class="filter-btn active" id="filterAll" onclick="setFilter('all')">전체</button>
        <button class="filter-btn" id="filterCorrect" onclick="setFilter('correct')">✅ 정답</button>
        <button class="filter-btn" id="filterWrong" onclick="setFilter('wrong')">❌ 오답</button>
      </div>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<script>
let allQuestions = [];
let queue = [];
let current = null;
let answered = false;
let stats = { correct: 0, wrong: 0 };
let wrongIds = new Set();
let mode = 'random';
let seqIndex = 0;

// History: array of {q, selectedLetters, isCorrect, correctAnswers}
let history = [];
// historyPos: null = showing current question, number = viewing history[historyPos]
let historyPos = null;

let historyFilter = 'all';

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function loadQuestions() {
  try {
    const res = await fetch('questions.json');
    allQuestions = await res.json();
    initMode();
  } catch (e) {
    document.getElementById('mainContent').innerHTML =
      '<div class="loading" style="color:#ef4444">⚠️ questions.json 파일을 불러올 수 없습니다.<br><small>같은 폴더에 questions.json이 있는지 확인하세요.</small></div>';
  }
}

function setMode(m) {
  mode = m;
  ['modeRandom','modeSequential','modeWrong'].forEach(id =>
    document.getElementById(id).classList.remove('active'));
  document.getElementById('mode' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');
  seqIndex = 0;
  historyPos = null;
  initMode();
}

function initMode() {
  if (mode === 'random') {
    queue = shuffle(allQuestions);
  } else if (mode === 'sequential') {
    queue = [...allQuestions];
  } else if (mode === 'wrong') {
    const wrongList = allQuestions.filter(q => wrongIds.has(q.id));
    if (wrongList.length === 0) {
      showMessage('오답이 없습니다! 계속 문제를 풀어보세요.');
      return;
    }
    queue = shuffle(wrongList);
  }
  seqIndex = 0;
  historyPos = null;
  showCurrentQuestion();
}

function showCurrentQuestion() {
  historyPos = null;
  answered = false;
  if (seqIndex >= queue.length) {
    if (mode === 'wrong') {
      queue = shuffle(allQuestions.filter(q => wrongIds.has(q.id)));
      if (queue.length === 0) { showMessage('🎉 오답을 모두 맞혔습니다!'); return; }
    } else {
      queue = mode === 'random' ? shuffle(allQuestions) : [...allQuestions];
    }
    seqIndex = 0;
  }
  current = queue[seqIndex];
  seqIndex++;
  renderQuestion(current, null, null, false);
  updateProgress();
}

function showMessage(msg) {
  document.getElementById('mainContent').innerHTML =
    `<div style="text-align:center;padding:60px 20px;color:#94a3b8;font-size:16px">${msg}<br><br>
    <button class="btn btn-next" style="display:inline-flex;max-width:200px;margin:0 auto" onclick="setMode('${mode}')">다시 시작</button></div>`;
}

// Render a question.
// selectedLetters: pre-selected (for history), null for fresh
// isCorrect: null for fresh (unanswered), true/false for history
// correctAnswers: array, null for fresh
function renderQuestion(q, selectedLetters, correctAnswers, isHistory) {
  const isMulti = q.question.includes('개를 선택');
  const optionLetters = Object.keys(q.options);

  let historyBannerHtml = '';
  if (isHistory) {
    const idx = historyPos;
    const total = history.length;
    historyBannerHtml = `
      <div class="history-banner">
        <span class="history-banner-text">이전 문제 보기 (${idx + 1} / ${total})</span>
        <button class="btn-back-current" onclick="goBackToCurrent()">현재 문제로 →</button>
      </div>`;
  }

  let optionsHtml = optionLetters.map(letter => {
    let cls = '';
    if (isHistory && correctAnswers) {
      if (correctAnswers.includes(letter)) cls = 'correct';
      else if (selectedLetters && selectedLetters.includes(letter)) cls = 'wrong';
      else cls = 'dimmed';
    }
    return `
      <button class="option-btn ${cls}" id="opt_${letter}"
        ${isHistory ? 'disabled' : `onclick="selectOption('${letter}')"`}>
        <span class="option-letter">${letter}.</span>
        <span class="option-text">${escHtml(q.options[letter])}</span>
      </button>`;
  }).join('');

  const explanationHtml = q.explanation
    ? `<div class="explanation-text${isHistory ? ' show' : ''}" id="explanationDiv">${escHtml(q.explanation)}</div>`
    : '';

  let answerRevealHtml = '';
  if (isHistory && correctAnswers) {
    const entry = history[historyPos];
    const resultLabel = entry.isCorrect
      ? `<div class="result-msg show" style="color:#22c55e">✅ 정답이었습니다</div>`
      : (entry.selectedLetters.length === 0
          ? `<div class="result-msg show" style="color:#94a3b8">— 정답 보기만 했습니다</div>`
          : `<div class="result-msg show" style="color:#ef4444">❌ 오답이었습니다</div>`);
    answerRevealHtml = `
      <div class="answer-reveal show">
        <div class="answer-reveal-title">정답</div>
        <div class="answer-text">정답: ${correctAnswers.join(', ')}</div>
        ${explanationHtml}
      </div>
      ${resultLabel}`;
  } else {
    answerRevealHtml = `
      <div class="answer-reveal" id="answerReveal">
        <div class="answer-reveal-title">정답</div>
        <div class="answer-text" id="answerText"></div>
        ${explanationHtml}
      </div>
      <div class="result-msg" id="resultMsg"></div>`;
  }

  const prevDisabled = (isHistory ? historyPos === 0 : history.length === 0) ? 'disabled' : '';
  const answerDisabled = isHistory ? 'disabled' : '';
  const nextLabel = isHistory
    ? (historyPos < history.length - 1 ? '다음 ▶' : '현재 문제로 →')
    : '다음 문제 →';

  document.getElementById('mainContent').innerHTML = `
    ${historyBannerHtml}
    <div class="question-card">
      <div class="question-meta">
        <span class="question-num">문제 ${q.id}</span>
        ${isMulti ? `<span class="multi-badge">복수 선택</span>` : ''}
      </div>
      <div class="question-text">${escHtml(q.question)}</div>
    </div>
    <div class="options">${optionsHtml}</div>
    ${answerRevealHtml}
    <div class="btn-row">
      <button class="btn btn-prev" id="btnPrev" onclick="goPrev()" ${prevDisabled}>◀ 이전</button>
      <button class="btn btn-answer" id="btnAnswer" onclick="showAnswer()" ${answerDisabled}>정답 보기</button>
      <button class="btn btn-next" id="btnNext" onclick="goNext()">${nextLabel}</button>
    </div>`;
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectOption(letter) {
  if (answered || historyPos !== null) return;
  const btn = document.getElementById('opt_' + letter);
  if (btn.classList.contains('selected')) {
    btn.classList.remove('selected');
  } else {
    if (!current.question.includes('개를 선택')) {
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    }
    btn.classList.add('selected');
  }
}

function showAnswer() {
  if (answered || historyPos !== null) return;
  answered = true;

  const correctAnswers = current.answer.replace(/\s/g,'').split(/[,、]/).map(s => s.trim().toUpperCase());
  const selectedBtns = document.querySelectorAll('.option-btn.selected');
  const selectedLetters = Array.from(selectedBtns).map(b => b.id.replace('opt_',''));

  let isCorrect = false;
  if (selectedLetters.length > 0) {
    isCorrect = selectedLetters.length === correctAnswers.length &&
      selectedLetters.every(l => correctAnswers.includes(l));
  }

  document.querySelectorAll('.option-btn').forEach(btn => {
    const letter = btn.id.replace('opt_','');
    btn.disabled = true;
    if (correctAnswers.includes(letter)) {
      btn.className = 'option-btn correct';
    } else if (selectedLetters.includes(letter)) {
      btn.className = 'option-btn wrong';
    } else {
      btn.className = 'option-btn dimmed';
    }
  });

  document.getElementById('answerReveal').classList.add('show');
  document.getElementById('answerText').textContent = '정답: ' + correctAnswers.join(', ');
  const expDiv = document.getElementById('explanationDiv');
  if (expDiv && current.explanation) expDiv.classList.add('show');

  if (selectedLetters.length === 0) {
    showResult('— 선택 없이 정답 확인', '#94a3b8');
  } else if (isCorrect) {
    stats.correct++;
    wrongIds.delete(current.id);
    showResult('✅ 정답입니다!', '#22c55e');
  } else {
    stats.wrong++;
    wrongIds.add(current.id);
    showResult('❌ 오답입니다.', '#ef4444');
  }

  // Save to history
  history.push({ q: current, selectedLetters, isCorrect, correctAnswers });
  document.getElementById('btnAnswer').disabled = true;
  document.getElementById('btnPrev').disabled = false;
  updateStats();
}

function showResult(msg, color) {
  const el = document.getElementById('resultMsg');
  el.textContent = msg;
  el.style.color = color;
  el.classList.add('show');
}

// ── Navigation ──

function goPrev() {
  if (historyPos === null) {
    // Go to last history item
    if (history.length === 0) return;
    historyPos = history.length - 1;
  } else if (historyPos > 0) {
    historyPos--;
  } else {
    return; // Already at first
  }
  renderHistoryItem(historyPos);
}

function goNext() {
  if (historyPos === null) {
    // Normal next question
    showCurrentQuestion();
  } else if (historyPos < history.length - 1) {
    historyPos++;
    renderHistoryItem(historyPos);
  } else {
    // At last history item → go to current question
    goBackToCurrent();
  }
}

function goBackToCurrent() {
  historyPos = null;
  answered = false;
  renderQuestion(current, null, null, false);
  // Re-check if already answered (re-entering from history after answering)
  // Actually current question is fresh, so just show it unanswered
}

function renderHistoryItem(idx) {
  const entry = history[idx];
  renderQuestion(entry.q, entry.selectedLetters, entry.correctAnswers, true);
  updateProgress();
}

// ── Progress / Stats ──

function updateProgress() {
  const total = allQuestions.length;
  const done = Math.min(seqIndex, total);
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressText').textContent = done + ' / ' + total;
  document.getElementById('percentText').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function updateStats() {
  document.getElementById('statCorrect').textContent = '정답 ' + stats.correct;
  document.getElementById('statWrong').textContent = '오답 ' + stats.wrong;
  document.getElementById('statTotal').textContent = '총 ' + history.length + '문제';
  document.getElementById('scoreBadge').textContent = stats.correct + ' / ' + (stats.correct + stats.wrong);
  document.getElementById('historyCount').textContent = history.length;
}

// ── History Modal ──

function openHistory() {
  renderHistoryList();
  document.getElementById('modalOverlay').classList.add('show');
}

function closeHistory() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function closeHistoryOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeHistory();
}

function setFilter(f) {
  historyFilter = f;
  ['filterAll','filterCorrect','filterWrong'].forEach(id =>
    document.getElementById(id).classList.remove('active'));
  document.getElementById('filter' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active');
  renderHistoryList();
}

function renderHistoryList() {
  const list = document.getElementById('historyList');
  let items = history;
  if (historyFilter === 'correct') items = history.filter(e => e.isCorrect);
  if (historyFilter === 'wrong') items = history.filter(e => !e.isCorrect);

  if (items.length === 0) {
    list.innerHTML = '<div class="modal-empty">아직 풀었던 문제가 없습니다.</div>';
    return;
  }

  list.innerHTML = items.map((entry, i) => {
    const realIdx = history.indexOf(entry);
    const icon = entry.isCorrect ? '✅' : (entry.selectedLetters.length === 0 ? '👁' : '❌');
    const answerCls = entry.isCorrect ? 'correct' : 'wrong';
    const qPreview = entry.q.question.substring(0, 60) + (entry.q.question.length > 60 ? '…' : '');
    return `
      <div class="history-item" onclick="goToHistoryItem(${realIdx})">
        <div class="history-result-icon">${icon}</div>
        <div class="history-info">
          <div class="history-qnum">문제 ${entry.q.id}</div>
          <div class="history-qtext">${escHtml(qPreview)}</div>
        </div>
        <div class="history-answer ${answerCls}">정답 ${entry.correctAnswers.join(',')}</div>
      </div>`;
  }).join('');
}

function goToHistoryItem(idx) {
  closeHistory();
  historyPos = idx;
  renderHistoryItem(idx);
}

// Start
loadQuestions();
</script>
</body>
</html>
